  // 音效合成器 (Web Audio API)
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioContext();

  function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    const now = audioCtx.currentTime;
    if (type === 'flip') {
      // 翻转音效：轻微的"嗖"声
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
      gainNode.gain.setValueAtTime(0.1, now);
      gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'known') {
      // 认识：清脆的高音
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.setValueAtTime(800, now + 0.1);
      gainNode.gain.setValueAtTime(0.1, now);
      gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'unknown') {
      // 不认识：低沉的提示音
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(150, now + 0.2);
      gainNode.gain.setValueAtTime(0.05, now);
      gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
    }
  }

  let currentIndex = 0;
  let isFlipped = false;
  const cardElement = document.getElementById('flashcard');

  function updateCard() {
    if (vocabList.length === 0) return;
    const currentVocab = vocabList[currentIndex];
    document.getElementById('wordEn').innerText = currentVocab.word_en;
    document.getElementById('wordZh').innerText = currentVocab.word_zh;
    document.getElementById('exampleEn').innerText = currentVocab.example_en;
    document.getElementById('exampleZh').innerText = currentVocab.example_zh;
    document.getElementById('categoryBadge').innerText = currentVocab.category;
    document.getElementById('progressText').innerText = `${currentIndex + 1} / ${vocabList.length}`;
    isFlipped = false;
    cardElement.classList.remove('is-flipped');
  }

  function flipCard() {
    playSound('flip');
    isFlipped = !isFlipped;
    cardElement.classList.toggle('is-flipped');
  }

  function nextCard(known) {
    playSound(known ? 'known' : 'unknown');
    currentIndex = (currentIndex + 1) % vocabList.length;
    if (isFlipped) {
      flipCard();
      setTimeout(updateCard, 350); // 等待翻转动画过半再更新文字
    } else {
      updateCard();
    }
  }

  // JSON 导入功能
  function importVocabulary(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const importedData = JSON.parse(e.target.result);
        if (Array.isArray(importedData) && importedData.length > 0) {
          vocabList = importedData;
          currentIndex = 0;
          updateCard();
          alert(`成功导入 ${vocabList.length} 个词汇！`);
        } else {
          alert("JSON 格式错误：需要包含词汇对象的数组。");
        }
      } catch (error) {
        alert("文件解析失败，请确保是有效的 JSON 文件。");
      }
    };
    reader.readAsText(file);
  }

  updateCard();
</script>
